<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chann Thiv Settlement — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#070B14;font-family:'IBM Plex Mono',monospace;color:#CBD5E1;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:rgba(0,229,255,.06);top:-150px;left:-150px}
.orb-2{width:400px;height:400px;background:rgba(105,255,71,.04);bottom:-100px;right:-100px}
.page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.brand{text-align:center;margin-bottom:36px;animation:fadeDown .5s ease both}
.brand-logo{width:52px;height:52px;background:linear-gradient(135deg,#00E5FF,#0099CC);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:20px;color:#070B14;margin:0 auto 14px;box-shadow:0 0 30px rgba(0,229,255,.35),0 0 60px rgba(0,229,255,.15)}
.brand-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:5px;color:#E2E8F0}
.brand-sub{font-size:9px;color:#334155;letter-spacing:3px;margin-top:4px}
.card{background:#080D18;border:1px solid #0D1F35;border-radius:12px;padding:36px 44px;width:100%;max-width:400px;box-shadow:0 0 0 1px rgba(0,229,255,.04),0 24px 64px rgba(0,0,0,.5);animation:fadeUp .5s .15s ease both}
.card-title{font-size:11px;letter-spacing:2px;color:#475569;margin-bottom:28px;padding-bottom:14px;border-bottom:1px solid #0D1F35}
.fg{margin-bottom:18px}
.fl{display:block;font-size:9px;letter-spacing:2px;color:#475569;margin-bottom:7px}
.fc{width:100%;background:#0A0F1E;border:1px solid #1E3A5F;border-radius:6px;padding:11px 14px;font-family:'IBM Plex Mono';font-size:13px;color:#CBD5E1;outline:none;transition:border-color .2s,box-shadow .2s}
.fc:focus{border-color:#00E5FF66;box-shadow:0 0 0 3px rgba(0,229,255,.08)}
.fc::placeholder{color:#1E3A5F}
.pw-w{position:relative}.pw-w .fc{padding-right:58px}
.pw-t{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:#334155;cursor:pointer;font-size:10px;font-family:'IBM Plex Mono';letter-spacing:1px}
.pw-t:hover{color:#00E5FF}
.alert{border-radius:6px;padding:10px 13px;font-size:11px;margin-bottom:18px;display:none;align-items:center;gap:7px}
.alert.show{display:flex}
.alert-error{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:#FF4757}
.alert-info{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);color:#00E5FF}
.btn-login{width:100%;background:#00E5FF;border:none;border-radius:6px;padding:12px;font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;color:#070B14;cursor:pointer;transition:all .2s;margin-top:6px}
.btn-login:hover:not(:disabled){background:#33EEFF;box-shadow:0 0 20px rgba(0,229,255,.3);transform:translateY(-1px)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.footer{margin-top:20px;font-size:9px;color:#1E3A5F;letter-spacing:1px;text-align:center;animation:fadeUp .5s .3s ease both}
.footer span{color:#334155}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(7,11,20,.3);border-top:2px solid #070B14;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:7px}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="page">
  <div class="brand">
    <div class="brand-logo">CT</div>
    <div class="brand-title">CHANN THIV SETTLEMENT</div>
    <div class="brand-sub">INTERBANK FILE DISPATCHER · FIXED-WIDTH PARSER</div>
  </div>
  <div class="card">
    <div class="card-title">OPERATOR LOGIN</div>
    <div class="alert alert-info" id="alert-info"><span>ℹ</span><span id="info-msg">Initializing database connection...</span></div>
    <div class="alert alert-error" id="alert-error"><span>⚠</span><span id="err-msg">Invalid credentials.</span></div>
    <div class="fg"><label class="fl" for="inp-u">USERNAME</label><input class="fc" type="text" id="inp-u" placeholder="Enter username" autocomplete="username" autocapitalize="none"/></div>
    <div class="fg"><label class="fl" for="inp-p">PASSWORD</label><div class="pw-w"><input class="fc" type="password" id="inp-p" placeholder="Enter password" autocomplete="current-password" style="padding-right:60px"/><button class="pw-t" type="button" onclick="tpw()">SHOW</button></div></div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">SIGN IN</button>
  </div>
  <div class="footer">DEFAULT: <span>admin</span> / <span>Admin@1234</span> &nbsp;·&nbsp; Change after first login</div>
</div>
<script src="./js/auth.js"></script>
<script>
// Redirect if already logged in
if (Auth.isLoggedIn()) window.location.href = './system.html';

// Seed default admin if needed (async, non-blocking)
(async function() {
  if (!Auth.isConfigured()) {
    showInfo('DB not configured — edit js/auth.js with your Supabase credentials');
    return;
  }
  hideInfo();
  await Auth.seedDefaultAdmin();
})();

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function tpw() {
  const f = document.getElementById('inp-p'), b = document.querySelector('.pw-t');
  f.type = f.type === 'password' ? 'text' : 'password';
  b.textContent = f.type === 'password' ? 'SHOW' : 'HIDE';
}
function showError(msg) { document.getElementById('err-msg').textContent=msg; document.getElementById('alert-error').classList.add('show'); }
function hideError()    { document.getElementById('alert-error').classList.remove('show'); }
function showInfo(msg)  { document.getElementById('info-msg').textContent=msg; document.getElementById('alert-info').classList.add('show'); }
function hideInfo()     { document.getElementById('alert-info').classList.remove('show'); }

async function doLogin() {
  hideError();
  const u = document.getElementById('inp-u').value.trim();
  const p = document.getElementById('inp-p').value;
  const btn = document.getElementById('btn-login');
  if (!u || !p) { showError('Username and password are required.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>AUTHENTICATING...';
  await new Promise(r => setTimeout(r, 400));
  const result = await Auth.login(u, p);
  if (result.ok) {
    btn.innerHTML = '✓ ACCESS GRANTED';
    btn.style.background = '#69FF47';
    await new Promise(r => setTimeout(r, 500));
    window.location.href = 'system.html';
  } else {
    btn.disabled = false;
    btn.innerHTML = 'SIGN IN';
    showError(result.error);
    document.getElementById('inp-p').value = '';
    document.getElementById('inp-p').focus();
  }
}
</script>
</body>
</html>
