<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chann Thiv Settlement — Login</title>
  <link rel="stylesheet" href="./css/tokens.css"/>
  <link rel="stylesheet" href="./css/base.css"/>
  <link rel="stylesheet" href="./css/components.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; flex-direction:column; min-height:100vh; overflow:auto; }

    /* Grid background */
    body::before {
      content:''; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(0,212,245,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,245,.03) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none; z-index:0;
    }

    /* Ambient orbs */
    .orb { position:fixed; border-radius:50%; filter:blur(100px); pointer-events:none; z-index:0; }
    .orb-1 { width:500px; height:500px; background:rgba(0,212,245,.06); top:-150px; left:-150px; }
    .orb-2 { width:400px; height:400px; background:rgba(34,197,94,.04); bottom:-100px; right:-100px; }

    .page-content {
      position:relative; z-index:1;
      display:flex; flex-direction:column; align-items:center;
      padding:24px; width:100%; max-width:420px;
    }

    /* Brand */
    .brand { text-align:center; margin-bottom:36px; animation:fadeUp .5s ease both; }
    .brand-logo {
      width:52px; height:52px;
      background:linear-gradient(135deg, var(--cyan), #0099CC);
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-data); font-size:20px; font-weight:600;
      color:var(--bg-base);
      margin:0 auto 14px;
      box-shadow:0 0 30px rgba(0,212,245,.35), 0 0 60px rgba(0,212,245,.15);
    }

    /* Login card */
    .login-card {
      background:var(--bg-surface);
      border:1px solid var(--border-dim);
      border-radius:var(--radius-lg);
      padding:36px 44px;
      width:100%;
      box-shadow:0 0 0 1px rgba(0,212,245,.04), var(--shadow-lg);
      animation:fadeUp .5s .15s ease both;
    }

    .card-title {
      font-size:10px; font-weight:700;
      letter-spacing:2px; color:var(--text-muted);
      text-transform:uppercase;
      margin-bottom:28px; padding-bottom:14px;
      border-bottom:1px solid var(--border-dim);
    }

    /* Alerts */
    .alert {
      border-radius:var(--radius-sm);
      padding:10px 13px;
      font-size:11px; font-weight:500;
      margin-bottom:18px;
      display:none; align-items:center; gap:7px;
      line-height:1.5;
    }
    .alert.visible { display:flex; }
    .alert-error { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:var(--red); }
    .alert-info  { background:var(--cyan-a12);   border:1px solid rgba(0,212,245,.2); color:var(--cyan); }

    /* Login button */
    .btn-login {
      width:100%;
      background:var(--cyan);
      border:none; border-radius:var(--radius-sm);
      padding:12px;
      font-family:var(--font-brand);
      font-size:20px; letter-spacing:3px;
      color:var(--bg-base);
      cursor:pointer;
      transition:all var(--ease-normal);
      margin-top:6px;
    }
    .btn-login:hover:not(:disabled) { background:#33EEFF; box-shadow:0 0 20px rgba(0,212,245,.3); transform:translateY(-1px); }
    .btn-login:disabled { opacity:.6; cursor:not-allowed; transform:none; }

    .login-footer {
      margin-top:20px;
      font-size:10px; color:var(--text-muted);
      letter-spacing:1px; text-align:center;
      animation:fadeUp .5s .3s ease both;
    }
    .login-footer span { color:var(--text-tertiary); font-weight:600; }

    @keyframes spin-sm { to { transform:rotate(360deg); } }
    .spinner-sm {
      display:inline-block; width:13px; height:13px;
      border:2px solid rgba(6,10,18,.3);
      border-top:2px solid var(--bg-base);
      border-radius:50%;
      animation:spin-sm .8s linear infinite;
      vertical-align:middle; margin-right:7px;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="page-content">
    <div class="brand">
      <div class="brand-logo">CT</div>
      <div class="app-title">CHANN THIV SETTLEMENT</div>
      <div class="app-subtitle">Interbank File Dispatcher · Fixed-Width Parser</div>
    </div>

    <div class="login-card">
      <div class="card-title">Operator Login</div>

      <div class="alert alert-info" id="alert-info">
        <span>ℹ</span>
        <span id="info-msg">Initializing database connection...</span>
      </div>
      <div class="alert alert-error" id="alert-error">
        <span>⚠</span>
        <span id="err-msg">Invalid credentials.</span>
      </div>

      <div class="fg">
        <label class="field-label" for="inp-username">Username</label>
        <input class="field-input" type="text" id="inp-username"
          placeholder="Enter username"
          autocomplete="username" autocapitalize="none"/>
      </div>

      <div class="fg">
        <label class="field-label" for="inp-password">Password</label>
        <div class="pw-wrap">
          <input class="field-input" type="password" id="inp-password"
            placeholder="Enter password"
            autocomplete="current-password"/>
          <button class="pw-toggle" type="button"
            onclick="togglePwVisible('inp-password', this)">Show</button>
        </div>
      </div>

      <button class="btn-login" id="btn-login" onclick="doLogin()">Sign In</button>
    </div>

    <div class="login-footer">
      Default: <span>admin</span> / <span>Admin@1234</span>
      &nbsp;·&nbsp; Change after first login
    </div>
  </div>

  <div id="toast"></div>

  <script src="./js/auth.js"></script>
  <script src="./js/utils.js"></script>
  <script>
    // Already logged in → go to system
    if (Auth.isLoggedIn()) window.location.href = './system.html';

    // Seed default admin (non-blocking)
    (async function init() {
      if (!Auth.isConfigured()) {
        _showInfo('DB not configured — edit js/auth.js with your Supabase credentials');
        return;
      }
      _hideInfo();
      await Auth.seedDefaultAdmin();
    })();

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function _showInfo(msg) {
      document.getElementById('info-msg').textContent = msg;
      document.getElementById('alert-info').classList.add('visible');
    }
    function _hideInfo() {
      document.getElementById('alert-info').classList.remove('visible');
    }
    function _showError(msg) {
      document.getElementById('err-msg').textContent = msg;
      document.getElementById('alert-error').classList.add('visible');
    }
    function _hideError() {
      document.getElementById('alert-error').classList.remove('visible');
    }

    async function doLogin() {
      _hideError();
      const u   = document.getElementById('inp-username').value.trim();
      const p   = document.getElementById('inp-password').value;
      const btn = document.getElementById('btn-login');

      if (!u || !p) { _showError('Username and password are required.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-sm"></span>Authenticating...';

      await new Promise(r => setTimeout(r, 400));
      const result = await Auth.login(u, p);

      if (result.ok) {
        btn.innerHTML = '✓ Access Granted';
        btn.style.background = 'var(--green)';
        await new Promise(r => setTimeout(r, 500));
        window.location.href = './system.html';
      } else {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
        _showError(result.error);
        document.getElementById('inp-password').value = '';
        document.getElementById('inp-password').focus();
      }
    }
  </script>
</body>
</html>
